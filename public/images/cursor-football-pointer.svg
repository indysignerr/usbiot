<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g transform="rotate(-12, 14, 14)">
    <!-- Ball body -->
    <circle cx="14" cy="14" r="13" fill="#FFFFFF" stroke="#000000" stroke-width="1.3"/>
    <!-- Center pentagon -->
    <polygon points="14,6.5 18.3,9.5 16.8,14.8 11.2,14.8 9.7,9.5" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Top pentagon -->
    <polygon points="14,1.5 17.5,5 15.8,7 12.2,7 10.5,5" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Top-right -->
    <polygon points="21,10 26,9.5 26.5,14 22.5,14.8 18.8,11" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Bottom-right -->
    <polygon points="22,17.5 26.5,17.5 24.5,23 19.5,22.5 18.5,19" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Bottom -->
    <polygon points="10.5,20 12.5,17.2 15.5,17.2 17.5,20 16,24.5 12,24.5" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Bottom-left -->
    <polygon points="6,17.5 9.5,19 8.5,22.5 3,23 1.5,17.5" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Top-left -->
    <polygon points="7,10 9,11 5.5,14.8 1.5,14 1.5,9.5" fill="#000000" stroke="#000" stroke-width="0.7"/>
    <!-- Seam lines -->
    <line x1="10.5" y1="5" x2="12.2" y2="7" stroke="#000" stroke-width="0.7"/>
    <line x1="17.5" y1="5" x2="15.8" y2="7" stroke="#000" stroke-width="0.7"/>
    <line x1="18.3" y1="9.5" x2="21" y2="10" stroke="#000" stroke-width="0.7"/>
    <line x1="16.8" y1="14.8" x2="18.5" y2="16.5" stroke="#000" stroke-width="0.7"/>
    <line x1="11.2" y1="14.8" x2="9.5" y2="16.5" stroke="#000" stroke-width="0.7"/>
    <line x1="9.7" y1="9.5" x2="7" y2="10" stroke="#000" stroke-width="0.7"/>
  </g>
  <!-- Red pointer arrow in bottom-right -->
  <polygon points="26,22 32,32 22,28" fill="#d8261c" stroke="#FFFFFF" stroke-width="0.8"/>
</svg>
